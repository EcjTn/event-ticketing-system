server:
  servlet:
    context-path: /api

spring:
  application:
    name: event-ticketing-backend

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ticket_management_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  modulith:
    events: # For Outbox pattern
      jdbc:
        schema-initialization:
          enabled: false # Flyway handles this
      republish-outstanding-events-on-restart: true

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:name}
  api-key: ${CLOUDINARY_API_KEY:key}
  api-secret: ${CLOUDINARY_API_SECRET:secret}